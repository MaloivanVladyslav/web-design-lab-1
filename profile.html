<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyWords - Профіль</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EasyWords</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="myMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center py-5" style="min-height: 75vh;">

        <div class="card shadow w-100" style="max-width: 850px; width: 100%;">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0"><i class="bi bi-person-badge"></i> Мій кабінет</h3>
            </div>

            <div class="card-body p-4"> 
                <div class="row align-items-center">

                    <div class="col-md-4 text-center mb-4 mb-md-0"> 
                        <div class="mb-2">
                            <i class="bi bi-person-circle text-secondary" style="font-size: 150px; line-height: 1;"></i> 
                        </div>
                        <h5 class="fw-bold mb-1" id="profileName">Завантаження...</h5>
                        <p class="text-muted mb-2" id="profileEmailBadge">...</p>
                        <span class="badge bg-success mb-3 px-3 py-2" id="profileStats" style="font-size: 0.9rem;">Вивчено слів: 0 з 0</span>
                    </div>
                    
                    <div class="col-md-8 ps-md-4">
                        <h4 class="mb-4 text-primary">Особисті дані</h4>

                        <table class="table table-hover">
                            <tbody>
                                <tr>
                                    <th scope="row" class="text-secondary" style="width: 40%;">Повне ім'я</th>
                                    <td class="fw-bold" id="profileFullName">...</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-secondary" style="width: 40%;">Email</th>
                                    <td id="profileEmail">...</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-secondary" style="width: 40%;">Стать</th>
                                    <td id="profileGender">...</td>
                                </tr>
                                <tr>
                                    <th scope="row" class="text-secondary" style="width: 40%;">Дата народження</th>
                                    <td id="profileDob">...</td>
                                </tr>
                            </tbody>
                        </table>

                        <div class="mt-4 text-end">
                            <button class="btn btn-outline-danger me-2" id="logoutBtn">
                                <i class="bi bi-box-arrow-right"></i> Вийти
                            </button>
                            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#editProfileModal">
                                <i class="bi bi-pencil-square"></i> Редагувати профіль
                            </button>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold">Редагувати профіль</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="editProfileForm">
                            <div class="mb-3">
                                <label class="form-label text-muted">Ім'я та прізвище</label>
                                <input type="text" class="form-control" id="editName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">Email</label>
                                <input type="email" class="form-control" id="editEmail" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted">Стать</label>
                                <select class="form-select" id="editGender">
                                    <option value="male">Чоловіча</option>
                                    <option value="female">Жіноча</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-muted">Дата народження</label>
                                <input type="date" class="form-control" id="editDob">
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Зберегти зміни</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
    </main> 

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 EasyWords. Всі права захищені.</p>
            <small class="text-secondary">Лабораторна робота №2. Web-дизайн.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/profile.js"></script>
</body>
</html>
