<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyWords - Головна</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">EasyWords</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#myMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="myMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">Головна</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Про додаток</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html">Профіль</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Вхід</a></li>
                    <li class="nav-item"><a class="nav-link" href="register.html">Реєстрація</a></li>
                </ul>
            </div>
        </div>
    </nav>
    
    <main class="container my-5">

        <div class="row align-items-center mb-4">
            <div class="col-md-6">
                <h2 class="fw-bold text-dark mb-3 mb-md-0">
                    <i class="bi bi-journal-text text-primary"></i> Мій словник
                </h2>
            </div>
        
            <div class="col-md-6">
                <div class="d-flex gap-2">
                    <input class="form-control" type="search" placeholder="Пошук слова...">
                    <button class="btn btn-success text-nowrap" data-bs-toggle="modal" data-bs-target="#addWordModal">
                        <i class="bi bi-plus-lg"></i>
                        <span class="d-none d-sm-inline">Додати</span>
                    </button>
                </div>
            </div>
        </div>

        <div class="row g-3">
            
        </div>

        <nav class="mt-5" style="display: none;">
            <ul class="pagination justify-content-center">
                
            </ul>
        </nav>

        <div class="modal fade" id="addWordModal" tabindex="-1" aria-labelledby="addWordModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title fw-bold" id="addWordModalLabel">Додати нове слово</h5>
                        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    <div class="modal-body">
                        <form id="addWordForm">
                            <div class="mb-3">
                                <label for="englishWord" class="form-label text-muted">Слово англійською</label>
                                <input type="text" class="form-control" id="englishWord" placeholder="Наприклад: Sunshine" required>
                            </div>
                            <div class="mb-4">
                                <label for="ukrainianWord" class="form-label text-muted">Переклад</label>
                                <input type="text" class="form-control" id="ukrainianWord" placeholder="Наприклад: Сонячне світло" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary">Зберегти слово</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <template id="word-card-template">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm h-100 border-0">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <div>
                            <h4 class="card-title text-primary mb-1 js-english"></h4>
                            <p class="card-text text-muted mb-0 js-ukrainian"></p>
                        </div>
                        <span class="badge rounded-pill js-badge"></span>
                    </div>
                    <div class="card-footer bg-white border-0 text-end">
                        <button class="btn btn-sm btn-outline-secondary btn-speak" title="Озвучити">
                            <i class="bi bi-volume-up"></i>
                        </button>
                        <button class="btn btn-sm btn-toggle">
                            <i class="bi js-icon-toggle"></i>
                        </button>
                        <button class="btn btn-sm btn-outline-danger btn-delete" title="Видалити">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </div>
            </div>
        </template>

    </main> 

    <footer class="bg-dark text-white text-center py-4 mt-auto">
        <div class="container">
            <p class="mb-1">&copy; 2026 EasyWords. Всі права захищені.</p>
            <small class="text-secondary">Лабораторна робота №2. Web-дизайн.</small>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/index.js"></script>
</body>
</html>
